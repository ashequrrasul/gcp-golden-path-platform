replicaCount: 1
image:
  repository: us-central1-docker.pkg.dev/project-40d105bf-bb2b-4bf6-b9f/golden-path/ecommerce-frontend
  tag: 4da96874bcac
  pullPolicy: IfNotPresent
nameOverride: ecommerce-frontend
fullnameOverride: ecommerce-frontend
service:
  type: ClusterIP
  port: 80
  targetPort: 8080
  annotations:
    cloud.google.com/backend-config: '{"default":"ecommerce-frontend-backend-config"}'
    cloud.google.com/neg: '{"ingress": true}'
backendConfig:
  enabled: true
  name: ecommerce-frontend-backend-config
  healthCheck:
    checkIntervalSec: 15
    timeoutSec: 5
    healthyThreshold: 1
    unhealthyThreshold: 3
    type: HTTP
    requestPath: /healthz
    port: 8080
ingress:
  enabled: true
  host: gcp.lovelu.com
  staticIpName: golden-path-ip
  productServiceName: golden-path-microservice
  productServicePortName: http
  cartPaymentServiceName: cart-payment-service
  cartPaymentServicePortName: http
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 250m
    memory: 256Mi
autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 2
  targetCPUUtilizationPercentage: 70
