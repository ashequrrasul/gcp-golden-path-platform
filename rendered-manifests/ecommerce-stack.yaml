    kubernetes.io/ingress.allow-http: "true"
    networking.gke.io/managed-certificates: ecommerce-managed-cert
    networking.gke.io/v1beta1.FrontendConfig: ecommerce-frontend-config
spec:
  rules:
    - host: gcp.lovelu.com
      http:
        paths:
          - path: /products
            pathType: Prefix
            backend:
              service:
                name: product-service
                port:
                  name: http
          - path: /orders
            pathType: Prefix
            backend:
              service:
                name: order-service
                port:
                  name: http
          - path: /cart
            pathType: Prefix
            backend:
              service:
                name: cart-payment-service
                port:
                  name: http
          - path: /checkout
            pathType: Prefix
            backend:
              service:
                name: cart-payment-service
                port:
                  name: http
          - path: /payments
            pathType: Prefix
            backend:
              service:
                name: cart-payment-service
                port:
                  name: http
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ecommerce-frontend
                port:
                  name: http
