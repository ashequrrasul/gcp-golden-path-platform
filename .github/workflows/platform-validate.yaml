name: platform-validate

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.11.2

      - name: Terraform format check
        run: terraform fmt -check -recursive

      - name: Helm lint
        run: helm lint helm/microservice

      - name: Helm template
        run: helm template golden-path-microservice helm/microservice --namespace golden-path
